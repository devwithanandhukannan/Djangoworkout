<!-- products/templates/products/product_confirm_delete.html -->
{% extends 'base.html' %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
    <h1 class="mb-4">{{ title }}</h1>
    <div class="alert alert-danger" role="alert">
        Are you sure you want to delete the product "<strong>{{ product.name }}</strong>"?
        This action cannot be undone.
    </div>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger mr-2">Confirm Delete</button>
        <a href="{% url 'product_detail' product.pk %}" class="btn btn-secondary">Cancel</a>
    </form>
{% endblock %}
